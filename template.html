<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracht + Partner ARCHITEKTEN</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <script type="text/javascript" src="js/main.js"></script>
</head>
<body background="pics/background.jpg">

<div class="site-container">

    <!-- ==========================================================================
         OBERER BEREICH: DIE DREI-EBENEN MENÜ-STRUKTUR
         ========================================================================== -->
    <div class="top-navigation-area">
        
        <!-- SPALTE 1: HAUPTMENÜ (p, i, a, c) -->
        <div class="menu-column">
            <div class="logo-container">
                <img src="pics/Bracht_und_Partner.gif" alt="Bracht + Partner Logo" class="brand-logo">
            </div>
            <nav class="main-navigation">
                <a href="index.html" class="menu-btn" id="btn_p">
                    <img src="pics/buttons/ProjectsBlack.gif" class="img-black" alt="Projects">
                    <img src="pics/buttons/ProjectsRed.gif" class="img-red" alt="Projects">
                </a>
                <a href="inside.html" class="menu-btn" id="btn_i">
                    <img src="pics/buttons/InsideBlack.gif" class="img-black" alt="Inside">
                    <img src="pics/buttons/InsideRed.gif" class="img-red" alt="Inside">
                </a>
                <a href="outside.html" class="menu-btn" id="btn_a">
                    <img src="pics/buttons/OutsideBlack.gif" class="img-black" alt="Outside">
                    <img src="pics/buttons/OutsideRed.gif" class="img-red" alt="Outside">
                </a>
                <a href="address.html" class="menu-btn" id="btn_c">
                    <img src="pics/buttons/ContactBlack.gif" class="img-black" alt="Contact">
                    <img src="pics/buttons/ContactRed.gif" class="img-red" alt="Contact">
                </a>
            </nav>
        </div>
        
        <!-- SPALTE 2: SUB-MENÜ (dynamisch gefüllt basierend auf Hauptmenü) -->
        <div class="sub-column hidden" id="sub-menu">
            <!-- PLATZHALTER_SUB_MENU -->
        </div>
        
        <!-- SPALTE 3: SUBSUB-MENÜ (dynamisch gefüllt basierend auf Sub) -->
        <div class="subsub-column hidden" id="subsub-menu">
            <div class="subsub-matrix">
                <!-- PLATZHALTER_SUBSUB_MENU -->
            </div>
        </div>
    </div>

    <!-- ==========================================================================
         UNTERER BEREICH: DAS INHALTSFELD (Text, Thumbnails, Hauptbild)
         ========================================================================== -->
    <main class="middle-content-zone">
        <div class="text-box">
            <!-- PLATZHALTER_TEXT -->
        </div>
        <div class="thumbs-box">
            <!-- PLATZHALTER_THUMBS -->
        </div>
        <div class="main-image-box">
            <!-- PLATZHALTER_HAUPTBILD -->
        </div>
    </main>

</div>

</body>
</html>
